version: "3.8"

services:

  mariadb:
    image: mariadb:10.11
    container_name: glpi_mariadb
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${MARIADB_DATABASE}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
    volumes:
      - glpi_db_data:/var/lib/mysql
    networks:
      - glpi_network

  glpi:
    image: glpi/glpi:latest
    container_name: glpi_app
    restart: always
    ports:
      - "${GLPI_PORT}:80"
    environment:
      MARIADB_HOST: mariadb
      MARIADB_DATABASE: ${MARIADB_DATABASE}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
    volumes:
      - glpi_files:/var/www/html/files
      - glpi_plugins:/var/www/html/plugins
      - glpi_config:/var/www/html/config
    depends_on:
      - mariadb
    networks:
      - glpi_network

volumes:
  glpi_db_data:
  glpi_files:
  glpi_plugins:
  glpi_config:

networks:
  glpi_network:
    driver: bridge
